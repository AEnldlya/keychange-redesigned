<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#deeafc"/>

  <!-- Diagonal cross lines -->
  <line x1="0" y1="0" x2="400" y2="300" stroke="#b8d0f0" stroke-width="1.5"/>
  <line x1="400" y1="0" x2="0" y2="300" stroke="#b8d0f0" stroke-width="1.5"/>

  <!-- Border -->
  <rect x="1" y="1" width="398" height="298" fill="none" stroke="#b8d0f0" stroke-width="2"/>

  <!-- Photo icon frame -->
  <rect x="155" y="98" width="90" height="72" rx="5" fill="none" stroke="#4a90d9" stroke-width="2.5"/>

  <!-- Mountain silhouette inside frame -->
  <polyline points="159,162 178,136 196,153 212,139 241,162"
            fill="none" stroke="#4a90d9" stroke-width="2.5"
            stroke-linejoin="round" stroke-linecap="round"
            clip-path="url(#frame-clip)"/>

  <!-- Sun circle inside frame -->
  <circle cx="172" cy="113" r="9" fill="none" stroke="#4a90d9" stroke-width="2.5"/>

  <!-- Clip to frame bounds -->
  <defs>
    <clipPath id="frame-clip">
      <rect x="155" y="98" width="90" height="72" rx="5"/>
    </clipPath>
  </defs>

  <!-- "Image" label -->
  <text x="200" y="200" text-anchor="middle"
        font-family="sans-serif" font-size="12"
        fill="#4a90d9" font-weight="600" letter-spacing="1">IMAGE</text>
</svg>
