<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6 -2 232 84" width="220" height="80">
  <!-- Musical note icon with radiating lines -->
  <!-- Rays -->
  <line x1="28" y1="52" x2="8"  y2="62" stroke="#f5c518" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="28" y1="52" x2="6"  y2="50" stroke="#f5c518" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="28" y1="52" x2="8"  y2="38" stroke="#f5c518" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Note stem -->
  <line x1="44" y1="20" x2="44" y2="52" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Note beam (eighth note flag) -->
  <path d="M44 20 C54 22, 58 30, 54 38" stroke="#f5c518" stroke-width="3.2" fill="none" stroke-linecap="round"/>

  <!-- Note head (filled oval) -->
  <ellipse cx="40" cy="54" rx="7" ry="5.5" fill="#f5c518" transform="rotate(-15 40 54)"/>

  <!-- "Key Change" text -->
  <text x="68" y="35" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#f5c518" letter-spacing="-0.5">Key</text>
  <text x="68" y="64" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="#f5c518" letter-spacing="-0.5">Change</text>
</svg>
